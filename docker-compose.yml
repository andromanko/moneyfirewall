services:
  postgres:
    image: postgres:16
    profiles: ["db"]
    environment:
      POSTGRES_DB: ${POSTGRES_FINTRACTION_DB:-moneyfirewall}
      POSTGRES_USER: ${POSTGRES_FINTRACTION_USER:-moneyfirewall}
      POSTGRES_PASSWORD: ${POSTGRES_FINTRACTION_PASSWORD:-moneyfirewall}
      TZ: ${TZ:-Europe/Minsk}
    volumes:
      - moneyfirewall_pg:/var/lib/postgresql/data

  db_init:
    image: postgres:16
    profiles: ["db_init"]
    environment:
      POSTGRES_FINTRACTION_HOST: localhost
      POSTGRES_FINTRACTION_PORT: 5432
      POSTGRES_FINTRACTION_DB: ${POSTGRES_FINTRACTION_DB:-moneyfirewall}
      POSTGRES_FINTRACTION_ADMIN_USER: ${POSTGRES_FINTRACTION_ADMIN_USER:-postgres}
      POSTGRES_FINTRACTION_ADMIN_PASSWORD: ${POSTGRES_FINTRACTION_ADMIN_PASSWORD:-}
    entrypoint: ["/bin/bash","-lc"]
    command: >
      export PGPASSWORD="$POSTGRES_FINTRACTION_ADMIN_PASSWORD";
      until pg_isready -h "$POSTGRES_FINTRACTION_HOST" -p "$POSTGRES_FINTRACTION_PORT" -U "$POSTGRES_FINTRACTION_ADMIN_USER"; do
        sleep 1;
      done;
      psql -h "$POSTGRES_FINTRACTION_HOST" -p "$POSTGRES_FINTRACTION_PORT" -U "$POSTGRES_FINTRACTION_ADMIN_USER" -d postgres
      -v ON_ERROR_STOP=1
      -tc "SELECT 1 FROM pg_database WHERE datname='${POSTGRES_FINTRACTION_DB}'" | grep -q 1
      || psql -h "$POSTGRES_FINTRACTION_HOST" -p "$POSTGRES_FINTRACTION_PORT" -U "$POSTGRES_FINTRACTION_ADMIN_USER" -d postgres
         -v ON_ERROR_STOP=1
         -c "CREATE DATABASE \\\"${POSTGRES_FINTRACTION_DB}\\\";";
      echo "db_init done";

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_FINTRACTION_HOST: ${POSTGRES_FINTRACTION_HOST:-postgres}
      POSTGRES_FINTRACTION_PORT: ${POSTGRES_FINTRACTION_PORT:-5432}
      POSTGRES_FINTRACTION_DB: ${POSTGRES_FINTRACTION_DB:-moneyfirewall}
      POSTGRES_FINTRACTION_USER: ${POSTGRES_FINTRACTION_USER:-moneyfirewall}
      POSTGRES_FINTRACTION_PASSWORD: ${POSTGRES_FINTRACTION_PASSWORD:-moneyfirewall}
      TELEGRAM_FINTRACTION_BOT_TOKEN: ${TELEGRAM_FINTRACTION_BOT_TOKEN:-}
      TELEGRAM_FINTRACTION_BOT_USERNAME: ${TELEGRAM_FINTRACTION_BOT_USERNAME:-moneyfirewall_bot}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SHEETS_PREFIX: ${GOOGLE_SHEETS_PREFIX:-MoneyFirewall}
      TZ: ${TZ:-Europe/Minsk}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${TZ:-Europe/Minsk}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  moneyfirewall_pg:

