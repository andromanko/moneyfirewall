services:
  postgres:
    image: postgres:16
    container_name: fin-bot-db
    environment:
      POSTGRES_DB: fin-bot-db
      POSTGRES_USER: ${POSTGRES_FINTRACTION_USER:-moneyfirewall}
      POSTGRES_PASSWORD: ${POSTGRES_FINTRACTION_PASSWORD:-abezyany_TUT_niprichEM!!!-)))}
      TZ: ${TZ:-Europe/Minsk}
    volumes:
      - moneyfirewall_pg:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      moneyfirewall_net:
        aliases:
          - fin-bot-db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_FINTRACTION_HOST: ${POSTGRES_FINTRACTION_HOST:-fin-bot-db}
      POSTGRES_FINTRACTION_PORT: ${POSTGRES_FINTRACTION_PORT:-5432}
      POSTGRES_FINTRACTION_DB: ${POSTGRES_FINTRACTION_DB:-fin-bot-db}
      POSTGRES_FINTRACTION_USER: ${POSTGRES_FINTRACTION_USER:-moneyfirewall}
      POSTGRES_FINTRACTION_PASSWORD: ${POSTGRES_FINTRACTION_PASSWORD:-abezyany_TUT_niprichEM!!!-)))}
      TELEGRAM_FINTRACTION_BOT_TOKEN: ${TELEGRAM_FINTRACTION_BOT_TOKEN:-}
      TELEGRAM_FINTRACTION_BOT_USERNAME: ${TELEGRAM_FINTRACTION_BOT_USERNAME:-moneyfirewall_bot}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SHEETS_PREFIX: ${GOOGLE_SHEETS_PREFIX:-MoneyFirewall}
      TZ: ${TZ:-Europe/Minsk}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${TZ:-Europe/Minsk}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8080"
    networks:
      - moneyfirewall_net

volumes:
  moneyfirewall_pg:

networks:
  moneyfirewall_net:

